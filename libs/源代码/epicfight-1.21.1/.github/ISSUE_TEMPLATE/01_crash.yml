name: 💥 Crash Report
description: Submit a Minecraft crash report for any issues, including mod conflicts, runtime crashes, or problems preventing the game from launching.
title: "[Crash]: "
labels: [ "crash", "bug" ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this report!
        
        Ensure that you have searched the [existing issues](https://github.com/Epic-Fight/epicfight/issues) before submitting a new one.

        Please consider following these steps to help us evaluate your report effectively:

        1. **Reproduce the issue** in a fresh Minecraft instance with as few mods as possible (or without if possible).
        2. **Share the log** as a link using [mclo.gs](https://mclo.gs) (or any similar service).
        3. **Prepare and Submit the report** with detailed relevant information:
            - Versions for: Minecraft, Epic Fight, mod-loader, and any relevant mod versions (direct download links are a bonus)
            - Minimal reproducible steps on how to reproduce (without modpacks or too many mods)
            - Is this a runtime OR a game launch crash?
            - Was this an issue in older Epic Fight versions if you have tested them?
            - Does this happen on a dedicated server or client (game)?
            - Screenshots or videos if applicable

        > [!IMPORTANT]
        > **Always:** reproduce the crash report with a **minimal set of mods**.  
        > Sharing reports from heavily modded instances (100+ mods) makes it nearly impossible to debug each mod individually due to the high volume of reports and limited resources.
        > We **only** focus on issues that **originate from Epic Fight mod itself**.
  - type: dropdown
    id: mc-version
    attributes:
      label: Minecraft Version
      description: These are the currently supported Minecraft versions
      options:
        - 1.21.1
        - 1.20.1
      default: 0
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Epic Fight Version
      description: "Epic Fight versions can be found on: https://modrinth.com/mod/epic-fight/versions"
      placeholder: e.g., 21.14.0
    validations:
      required: true
  - type: input
    id: log-link
    attributes:
      label: Minecraft Log Link
      description: "The full Minecraft log where the crash happens, uploaded via https://mclo.gs (or a similar web service)"
      placeholder: e.g., https://mclo.gs/whUNiDf
    validations:
      required: true
  - type: textarea
    attributes:
      label: Details
      description: Provide a clear step-by-step guide to reproduce the issue.
      placeholder: |
        Example:
        1. Right-click the sword 5 times on the same day
        2. Attack a creeper in front of your friend
        3. Creeper will crash the game and the dedicated server for all of us
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Epic-Fight/epicfight/blob/HEAD/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
